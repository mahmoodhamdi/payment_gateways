name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  package:
    name: package (Flutter)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: package
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: stable
          cache: true
      - name: pub get
        run: flutter pub get
      - name: format check
        run: dart format --output=none --set-exit-if-changed .
      - name: analyze
        run: flutter analyze --fatal-warnings
      - name: test
        run: flutter test --coverage
      - name: pana score
        run: |
          dart pub global activate pana
          dart pub global run pana --no-warning --exit-code-threshold 30 .

  template_app:
    name: template_app (Flutter)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: template_app
    needs: package
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: stable
          cache: true
      - name: pub get
        run: flutter pub get
      - name: analyze
        run: flutter analyze
      - name: test
        run: flutter test
      - name: build APK (debug)
        run: flutter build apk --debug

  backend:
    name: backend (Node.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend_companion
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: backend_companion/package-lock.json
      - name: install
        run: npm ci
      - name: typecheck
        run: npm run typecheck
      - name: test
        env:
          API_KEY: ci-only-test-key-1234567890
        run: npm run test
      - name: build
        run: npm run build
      - name: docker build
        run: docker build -t payment-gateways-backend:ci .
