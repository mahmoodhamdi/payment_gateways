name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  template_app_apk:
    name: template_app — Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: template_app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: stable
      - run: flutter pub get
      - run: flutter build apk --release --split-per-abi
      - uses: actions/upload-artifact@v4
        with:
          name: template-app-apks
          path: template_app/build/app/outputs/flutter-apk/*.apk

  backend_docker:
    name: backend — Docker image
    runs-on: ubuntu-latest
    needs: template_app_apk
    if: ${{ vars.PUBLISH_DOCKER == 'true' }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./backend_companion
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/payment-gateways-backend:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/payment-gateways-backend:latest

  github_release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: template_app_apk
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: template-app-apks
          path: ./apks
      - name: extract changelog section
        id: changelog
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v v="$version" '
            $0 ~ "^## \\[" v "\\]" { capture=1; next }
            capture && $0 ~ "^## \\[" { exit }
            capture
          ' package/CHANGELOG.md > release_notes.md
          cat release_notes.md
      - uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: ./apks/*.apk
          generate_release_notes: true

  # NOTE: pub.dev publishing is intentionally a manual step.
  # Run: cd package && flutter pub publish
  # See docs/PUBDEV_PUBLISH.md for the full checklist.
